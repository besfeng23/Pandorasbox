# ═══════════════════════════════════════════════════════════════════════════
# PANDORA'S BOX - GOOGLE CLOUD RUN DEPLOYMENT CONFIGURATION
# "Two-Brain System" - Hybrid Native AI Architecture
# ═══════════════════════════════════════════════════════════════════════════
# Firebase App Hosting Configuration
# See: https://firebase.google.com/docs/app-hosting/configure

# ─────────────────────────────────────────────────────────────────────────────
# CLOUD RUN SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
runConfig:
  minInstances: 1          # Keep warm to avoid cold starts
  maxInstances: 10         # Scale up to 10 instances
  concurrency: 80          # Requests per instance
  cpu: 1                   # 1 vCPU
  memoryMiB: 2048          # 2GB RAM
  
  # VPC Access Connector - Required for private IP access to Ollama & Qdrant
  vpcAccess:
    connector: projects/seismic-vista-480710-q5/locations/us-central1/connectors/pandora-vpc-connector
    egress: PRIVATE_RANGES_ONLY  # Only route private IPs through VPC

# ─────────────────────────────────────────────────────────────────────────────
# ENVIRONMENT VARIABLES
# ─────────────────────────────────────────────────────────────────────────────
env:
  # ═══════════════════════════════════════════════════════════════════════════
  # 🔥 FIREBASE PUBLIC CONFIGURATION (BUILD + RUNTIME)
  # ═══════════════════════════════════════════════════════════════════════════
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyBd6iZ2jEx1jmniBLD35no5gu1J4D4tSCM
    availability:
      - BUILD
      - RUNTIME
  
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: seismic-vista-480710-q5.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: seismic-vista-480710-q5
    availability:
      - BUILD
      - RUNTIME
  
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: seismic-vista-480710-q5.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "536979070288"
    availability:
      - BUILD
      - RUNTIME
  
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:536979070288:web:57b05547304f0056526055
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_PROJECT_ID
    value: seismic-vista-480710-q5
    availability:
      - BUILD
      - RUNTIME

  # ═══════════════════════════════════════════════════════════════════════════
  # 📊 SENTRY ERROR TRACKING
  # ═══════════════════════════════════════════════════════════════════════════
  - variable: NEXT_PUBLIC_SENTRY_DSN
    value: https://9c170ff10657b483a588e3f631bdfeb8@o4510689910784000.ingest.de.sentry.io/4510689928740944
    availability:
      - BUILD
      - RUNTIME

  # ═══════════════════════════════════════════════════════════════════════════
  # 🌌 SPLIT-BRAIN ARCHITECTURE (Universe, Builder, Reflex)
  # ═══════════════════════════════════════════════════════════════════════════
  # Private Ollama instance on VPC (Universe Agent)
  # NOTE: Updated from 10.128.0.4 to 10.128.0.8 (VM IP changed)
  - variable: UNIVERSE_INFERENCE_URL
    value: http://10.128.0.8:11434
    availability:
      - RUNTIME

  - variable: UNIVERSE_MODEL
    value: "llama3:70b-instruct-q4_0"
    availability:
      - RUNTIME

  - variable: BUILDER_MODEL
    value: "llama-3.3-70b-versatile"
    availability:
      - RUNTIME

  - variable: REFLEX_MODEL
    value: "llama-3.1-8b-instant"
    availability:
      - RUNTIME

  - variable: REFLEX_AUDIO_MODEL
    value: "whisper-large-v3"
    availability:
      - RUNTIME

  # ═══════════════════════════════════════════════════════════════════════════
  # 🧠 MEMORY SUBSYSTEM (Qdrant Vector Database)
  # ═══════════════════════════════════════════════════════════════════════════
  # Private Qdrant instance on VPC
  - variable: QDRANT_URL
    value: http://10.128.0.3:6333
    availability:
      - RUNTIME

  - variable: QDRANT_COLLECTION
    value: memories
    availability:
      - RUNTIME

  # ═══════════════════════════════════════════════════════════════════════════
  # 🔢 EMBEDDINGS SERVICE
  # ═══════════════════════════════════════════════════════════════════════════
  - variable: EMBEDDING_MODEL
    value: all-MiniLM-L6-v2
    availability:
      - RUNTIME
      
  - variable: EMBEDDINGS_BASE_URL
    value: https://pandora-embeddings-service-536979070288.us-central1.run.app
    availability:
      - RUNTIME

  # ═══════════════════════════════════════════════════════════════════════════
  # 📡 SERVER CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════════
  - variable: HOSTNAME
    value: "0.0.0.0"
    availability:
      - RUNTIME

  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME

  # ═══════════════════════════════════════════════════════════════════════════
  # 🔐 SECRETS (Google Secret Manager)
  # ═══════════════════════════════════════════════════════════════════════════
  # Firebase Admin Service Account
  - variable: FIREBASE_SERVICE_ACCOUNT_KEY
    secret: firebase-service-account-key@1
    availability:
      - RUNTIME

  - variable: ADMIN_CLIENT_EMAIL
    secret: firebase-client-email
    availability:
      - RUNTIME

  - variable: ADMIN_PRIVATE_KEY
    secret: firebase-private-key
    availability:
      - RUNTIME

  # Cron Job Authentication
  - variable: CRON_SECRET
    secret: cron-secret
    availability:
      - RUNTIME

  # Tavily Search API (Web Retrieval)
  - variable: TAVILY_API_KEY
    secret: tavily-api-key
    availability:
      - RUNTIME

  # ☁️ CLOUD BRAIN (Groq API for Builder Agent)
  - variable: GROQ_API_KEY
    secret: groq-api-key
    availability:
      - RUNTIME

  # 🔐 SOVEREIGN CORE (Ollama / vLLM Access)
  - variable: SOVEREIGN_KEY
    secret: sovereign-key
    availability:
      - RUNTIME

  - variable: OPENAI_API_KEY
    secret: openai-api-key
    availability:
      - RUNTIME
